<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 模块 - 设计稿 v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #fff;
    min-height: 100vh;
  }
  .ai-page {
    width: 100%;
    overflow-y: auto;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center;
    padding: 18px 16px 8px;
    font-size: 13px; font-weight: 600; color: #333;
  }
  .divider::before {
    content: '';
    width: 3px; height: 14px;
    background: #2d8cf0;
    border-radius: 2px;
    margin-right: 8px;
  }

  /* ── Section ── */
  .section { padding: 0 14px; }
  .section-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
  }
  .label {
    font-size: 12px; color: #666;
    white-space: nowrap; min-width: 36px; text-align: right;
  }
  .hint { font-size: 12px; color: #999; }

  /* ── Controls ── */
  .sel {
    height: 26px; border: 1px solid #ddd; border-radius: 4px;
    padding: 0 6px; font-size: 11px; background: #fff; outline: none; cursor: pointer;
  }
  .sel:focus { border-color: #2d8cf0; }
  .select-native {
    height: 18px;
    border: none;
    border-bottom: 1.5px solid #ddd;
    border-radius: 0;
    font-size: 12px;
    line-height: 1;
    outline: none;
    background: transparent;
    cursor: pointer;
    color: #333;
    padding: 0 2px;
  }
  .select-native:focus { border-bottom-color: #2d8cf0; }

  /* ── Slot Box ── */
  .slot-box {
    position: relative;
    border: 1px solid #e8eaec;
    border-radius: 6px;
    padding: 14px 10px 8px 6px;
    margin: 6px 0;
  }
  .slot-box-label {
    position: absolute;
    top: -8px; left: 10px;
    background: #fff;
    padding: 0 6px;
    font-size: 11px; color: #999;
  }

  /* ── Segmented ── */
  .segmented {
    display: inline-flex;
    background: #f0f2f5;
    border-radius: 11px;
    padding: 2px;
  }
  .seg-item {
    height: 20px;
    padding: 0 12px;
    display: flex; align-items: center;
    font-size: 11px; color: #999;
    border-radius: 10px; cursor: pointer;
    transition: .15s; user-select: none;
  }
  .seg-item.on {
    background: #fff; color: #2d8cf0;
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }
  .inp {
    height: 26px; border: 1px solid #ddd; border-radius: 4px;
    padding: 0 8px; font-size: 12px; outline: none; text-align: center;
  }
  .inp:focus { border-color: #2d8cf0; }

  .btn {
    height: 28px; border: 1px solid #2d8cf0; border-radius: 4px;
    padding: 0 14px; font-size: 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    background: #fff; color: #2d8cf0; transition: .15s;
  }
  .btn:hover { background: rgba(45,140,240,.06); }
  .btn-primary { background: #2d8cf0; color: #fff; border: none; }
  .btn-danger { background: #ed4014; color: #fff; border-color: #ed4014; }
  .btn-disabled {
    border-color: #ddd; color: #ccc; cursor: not-allowed;
  }

  /* ── Recording ── */
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ed4014; animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Output ── */
  .output-wrap { padding: 0 16px 20px; }
  .output {
    width: 100%; height: 220px; padding: 10px 12px;
    background: #1a1a2e; color: #e0e0e0; font-family: monospace;
    font-size: 12px; line-height: 1.6; border-radius: 6px;
    overflow-y: auto; white-space: pre-wrap; border: none; resize: none;
  }
  .output::-webkit-scrollbar { width: 3px; }
  .output::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

  /* ── Placeholder ── */
  .placeholder {
    text-align: center; padding: 32px 20px; color: #ccc;
  }
  .placeholder .ph-icon { font-size: 28px; margin-bottom: 6px; }
  .placeholder p { font-size: 12px; }

  /* ── Scrollbar ── */
  .ai-page::-webkit-scrollbar { width: 3px; }
  .ai-page::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
</style>
</head>
<body>

<div class="ai-page">

  <!-- ═══ 语音识别 ═══ -->
  <div class="divider">语音识别</div>
  <div class="section">
    <div class="slot-box">
      <span class="slot-box-label">模型配置</span>
      <!-- 未初始化：可编辑 -->
      <div class="section-row">
        <span class="label">模型</span>
        <select class="select-native" style="width:180px">
          <option>阿里云 NLS (实时)</option>
          <option>Azure Speech</option>
          <option>本地 Whisper</option>
        </select>
      </div>
      <div class="section-row">
        <span class="label">VAD</span>
        <span class="hint">最短语音</span>
        <input class="inp" style="width:56px" value="0.3" />
        <span class="hint">秒</span>
        <span class="hint" style="margin-left:8px">静音断句</span>
        <input class="inp" style="width:56px" value="0.8" />
        <span class="hint">秒</span>
      </div>
      <div class="section-row" style="padding-left:44px">
        <button class="btn btn-primary">初始化</button>
      </div>
      <!-- 已初始化状态（灰显 + 修改） -->
      <!--
      <div style="opacity:0.5;pointer-events:none">
        <div class="section-row"><span class="label">模型</span> 阿里云 NLS (实时)</div>
        <div class="section-row"><span class="label">VAD</span> 最短语音 0.3s / 静音断句 0.8s</div>
      </div>
      <div class="section-row">
        <button class="btn" style="font-size:10px;height:22px">修改</button>
        <span class="dot" style="margin-left:8px"></span>
        <span class="hint">已初始化</span>
      </div>
      -->
    </div>
    <div class="section-row">
      <span class="label">输入源</span>
      <span class="segmented">
        <span class="seg-item on">麦克风</span>
        <span class="seg-item">直播流</span>
      </span>
    </div>
    <div class="section-row" style="padding-left:44px">
      <button class="btn btn-disabled">▶ 开始</button>
    </div>
    <!-- 已初始化：按钮可点击 -->
    <!-- <div class="section-row">
      <button class="btn btn-primary">▶ 开始</button>
    </div> -->
    </div>
  </div>

  <!-- 输出区 -->
  <div style="padding: 8px 16px 0">
    <span class="hint">识别结果</span>
  </div>
  <div class="output-wrap">
    <textarea class="output" readonly style="color:#666">请先初始化模型配置</textarea>
  </div>

  <!-- ═══ AI 对话 ═══ -->
  <div class="divider">AI 对话</div>
  <div class="section">
    <div class="placeholder">
      <div class="ph-icon">💬</div>
      <p>接入大语言模型，智能回复弹幕</p>
    </div>
  </div>

</div>

</body>
</html>
