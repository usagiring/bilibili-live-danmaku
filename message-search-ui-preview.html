<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message 搜索选项 UI 设计稿</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #e8eaec;
    padding: 24px;
    color: #333;
  }
  h2 { font-size: 13px; color: #555; margin: 28px 0 10px; }
  h2:first-child { margin-top: 0; }
  h2 span { font-size: 11px; color: #999; font-weight: normal; margin-left: 8px; }

  .frame {
    width: 960px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
    padding: 8px 14px;
  }
  .tb-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; flex-wrap: wrap;
  }
  .tb-input {
    height: 24px; border: 1px solid #d9d9d9; border-radius: 4px;
    padding: 0 8px; font-size: 11px; outline: none; color: #555;
    transition: border-color .15s;
  }
  .tb-input:focus { border-color: #2d8cf0; }
  .tb-input.sm { width: 70px; }
  .tb-input.md { width: 140px; }
  .tb-input.lg { width: 220px; }
  .tb-btn {
    height: 24px; padding: 0 12px; border-radius: 4px;
    border: 1px solid #2d8cf0; background: #2d8cf0;
    color: #fff; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    height: 22px; padding: 0 10px; border-radius: 11px;
    border: 1px solid #ddd; font-size: 11px;
    display: flex; align-items: center; cursor: pointer;
    color: #666; user-select: none; transition: .15s;
  }
  .chip:hover { border-color: #aaa; }
  .chip.on {
    background: rgba(45,140,240,.08); border-color: #2d8cf0; color: #2d8cf0;
  }
  .tb-sep { width: 1px; height: 16px; background: #e8e8e8; margin: 0 2px; }
  .hint { font-size: 10px; color: #bbb; white-space: nowrap; }
  .hint.dark { color: #888; }
  .price-range { display: flex; align-items: center; gap: 3px; }
</style>
</head>
<body>

<!-- ═══ 方案 A：单行紧凑 ═══ -->
<h2>方案 A：单行紧凑 <span>推荐</span></h2>
<div class="frame">
  <div class="tb-row">
    <div class="tb-input lg" style="color:#bbb;">时间范围</div>
    <div class="tb-input md" style="color:#bbb;">关键词</div>
    <div class="price-range">
      <span class="hint dark">价格</span>
      <div class="tb-input sm" style="color:#bbb;">¥低</div>
      <span style="font-size:10px;color:#ccc;">-</span>
      <div class="tb-input sm" style="color:#bbb;">¥高</div>
    </div>
    <div class="tb-btn">🔍</div>
    <div class="tb-sep"></div>
    <div class="chips">
      <span class="chip">银瓜子</span>
      <span class="chip on">实时</span>
    </div>
  </div>
</div>

<!-- ═══ 方案 B：双行舒展 ═══ -->
<h2>方案 B：双行舒展</h2>
<div class="frame">
  <div class="tb-row">
    <span class="hint dark">时间</span>
    <div class="tb-input lg" style="color:#bbb;">选择时间范围</div>
    <span class="hint dark">关键词</span>
    <div class="tb-input md" style="color:#bbb;">ID / 用户名 / 内容</div>
    <span class="hint dark">礼物价格</span>
    <div class="price-range">
      <div class="tb-input sm" style="color:#bbb;">最低</div>
      <span style="font-size:10px;color:#ccc;">~</span>
      <div class="tb-input sm" style="color:#bbb;">最高</div>
    </div>
    <div class="tb-btn">搜索</div>
  </div>
  <div class="tb-row" style="padding-top:0;">
    <div class="chips">
      <span class="chip">银瓜子礼物</span>
      <span class="chip on">实时更新模式</span>
    </div>
  </div>
</div>

<!-- ═══ 方案 C：左右分区 ═══ -->
<h2>方案 C：左右分区</h2>
<div class="frame">
  <div class="tb-row">
    <div class="tb-input lg" style="color:#bbb;">📅 时间范围</div>
    <div class="tb-input md" style="color:#bbb;">🔎 搜索关键词</div>
    <div class="price-range">
      <span class="hint dark">💰</span>
      <div class="tb-input sm" style="color:#bbb;">0</div>
      <span style="font-size:10px;color:#ccc;">-</span>
      <div class="tb-input sm" style="color:#bbb;">999</div>
    </div>
    <div class="tb-btn">搜索</div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <div class="chips">
        <span class="chip">银瓜子</span>
        <span class="chip on">实时</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 方案 D：极简 ═══ -->
<h2>方案 D：极简标签式</h2>
<div class="frame">
  <div class="tb-row" style="gap:12px;">
    <div class="tb-input lg" style="color:#bbb;">时间范围</div>
    <div class="tb-input md" style="color:#bbb;">关键词</div>
    <div class="price-range">
      <div class="tb-input sm" style="color:#bbb;">¥0</div>
      <span style="font-size:11px;color:#aaa;">–</span>
      <div class="tb-input sm" style="color:#bbb;">¥∞</div>
    </div>
    <div class="chips">
      <span class="chip">银瓜子</span>
      <span class="chip on">实时</span>
    </div>
    <div style="margin-left:auto;">
      <div class="tb-btn">搜索</div>
    </div>
  </div>
</div>

</body>
</html>
